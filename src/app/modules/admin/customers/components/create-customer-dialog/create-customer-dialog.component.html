<ng-container *transloco="let t">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <h2 class="text-xl" mat-dialog-title>{{ t('create-customer-title') }}</h2>
    <mat-dialog-content class="flex flex-col">
      <mat-form-field appearance="fill">
        <input matInput formControlName="name" placeholder="Nome" />
      </mat-form-field>

      <mat-form-field appearance="fill">
        <textarea matInput formControlName="description" placeholder="Descrição"></textarea>
      </mat-form-field>

      <div>
        <mat-checkbox class="example-margin" formControlName="active"> Ativo? </mat-checkbox>
      </div>
    </mat-dialog-content>
    <mat-dialog-actions align="end">
      <button mat-button mat-dialog-close cdkFocusInitial>{{ t('cancel') }}</button>
      <button mat-flat-button color="primary" [disabled]="form.invalid">{{ t('save') }}</button>
    </mat-dialog-actions>
  </form>
</ng-container>
